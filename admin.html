<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Admin - Tribuana Properti</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #eee; }
        .box { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2c3e50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Login Akses Admin</h3>
        <input type="password" id="pass" placeholder="Masukkan Password Admin">
        <button onclick="login()">Masuk</button>
    </div>

    <script>
        function login() {
            const p = document.getElementById('pass').value;
            // Password sementara: "tribuana2026"
            if (p === "tribuana2026") {
                localStorage.setItem("admin_login", "true");
                window.location.href = "dashboard.html";
            } else {
                alert("Password Salah!");
            }
        }
    </script>
</body>
</html>
