<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin - Tribuana Properti</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; margin: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; background: #27ae60; color: white; border: none; }
        .logout-btn { background: #e74c3c; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <h2>Input Listing Properti Baru</h2>
        
        <input type="text" id="nama" placeholder="Nama Properti/Perumahan">
        <input type="number" id="harga" placeholder="Harga (Contoh: 500000000)">
        <input type="text" id="lokasi" placeholder="Lokasi">
        <textarea id="deskripsi" placeholder="Deskripsi Singkat"></textarea>
        
        <button id="btnSimpan" onclick="simpanData()">Simpan Data</button>
    </div>

    <script>
        if (localStorage.getItem("admin_login") !== "true") {
            window.location.href = "admin.html";
        }

        async function simpanData() {
            const btn = document.getElementById('btnSimpan');
            btn.innerText = "Mengirim...";
            
            const data = {
                nama: document.getElementById('nama').value,
                harga: document.getElementById('harga').value,
                lokasi: document.getElementById('lokasi').value,
                deskripsi: document.getElementById('deskripsi').value
            };
            
            // URL Google Apps Script Anda
            const url = "https://script.google.com/macros/s/AKfycby148efh9WhVxTkJHjSJRPpKOmj5qfVel1NdIdfv0T3iLW4X5u7d908CJv5uvHnKbNfOA/exec";

            try {
                await fetch(url, {
                    method: "POST",
                    mode: 'no-cors', // Penting agar tidak terkena error blokir browser
                    body: JSON.stringify(data)
                });
                alert("Data berhasil terkirim ke Google Sheets!");
                // Kosongkan form setelah berhasil
                document.querySelectorAll('input, textarea').forEach(el => el.value = '');
            } catch (error) {
                alert("Gagal mengirim data.");
            }
            btn.innerText = "Simpan Data";
        }

        function logout() {
            localStorage.removeItem("admin_login");
            window.location.href = "admin.html";
        }
    </script>
</body>
</html>
